<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deneme</title>
</head>
<body>
    <h1>Merhaba Sınıf</h1>
    <button id="change">Değiştir</button>
    <p id="yazi">Merhaba Sınıf</p>
    <input type="text" id="isim" placeholder="İsminizi Giriniz">

    <script>
        const change = document.getElementById('change');
        const yazi = document.getElementById('yazi');
        
        let tiklamasayisi = 0;
        change.addEventListener('click', function(){
            tiklamasayisi++;
            if(tiklamasayisi === 1){
                yazi.textContent='Butona Tıklandı'; 
            }
            else{
                yazi.textContent='Butona Tıklandı Yeni';
            }
        });
        const isim = document.getElementById('isim'); 

        isim.addEventListener('change', function(){
            console.log(isim.value);
            yazi.textContent= isim.value;
        });

        isim.addEventListener('input' , function(){
                yazi.style.textDecoration= 'underline';
                yazi.style.textDecorationColor = isim.value;
            
        });


    </script>   
</body>
</html>
